<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Proyecto personal de una tienda de vinilos con HTML, CSS y JavaScript.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css">
    <link rel="stylesheet" href="/src/assets/css/main.css">
    <link rel="shortcut icon" href="./src/assets/img/Logo.ico" type="image/x-icon">
    <title>Indenpendiente - Shop Vinyl</title>
</head>
<body>

    <header class="header">

        <section class="banner" id="banner">
            <div class="banner-contenedor" id="banner-contenedor">
                <div class="banner-logo original">
                    <img class="banner-img" src="./src/assets/img/Logo_Blanco.png" alt="Logo Empire Blanco">
                    <p class="banner-texto">100<span>%</span>INDEPENDIENTE</p>
                </div>
            </div>
        </section>

        <!-- Menú principal con botón de toggle -->
        <nav class="nav" aria-label="Menú principal">
          <button class="nav__toggle" aria-expanded="false" aria-controls="nav-list">
            <span class="nav__activo">Menú</span>
            <span aria-hidden="true" class="nav__close activo">Cerrar</span>
          </button>

          <ul class="nav__list activo" id="nav-list">
            <li class="nav__item"><a href="#">Home</a></li>
            <li class="nav__item"><a href="#">Shop</a></li>
            <li class="nav__item"><a href="#">Contact</a></li>
          </ul>
        </nav>

        <!-- Logo -->
        <section class="logo-principal">
            <img class="logo-principal__img" src="./src/assets/img/Logo_Negro.png" alt="Logo Empire Blanco">
            <p class="logo-principal__text">EMPIRE</p>
        </section>

        <section class="menu-carrito">
            <div class="carrito-contenedor">
                <i class="ri-shopping-bag-line"></i>
                <span class="carrito-cantidad">0</span>
            </div>
        </section>


    </header>

    <script type="module" src="./src/assets/js/main.js"></script>
    
</body>
</html>
